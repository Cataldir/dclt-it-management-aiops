# ─────────────────────────────────────────────────────────────
# Lesson 07 - Integration and Governance for AI Ops Pipelines
# ─────────────────────────────────────────────────────────────
# GitHub Actions CI/CD pipeline for training, validation,
# and conditional deployment of an ML model.
#
# Jobs:
#   train    -> trains the model and extracts metrics
#   validate -> quality gate (accuracy + fairness)
#   deploy   -> Terraform infra + canary deployment
# ─────────────────────────────────────────────────────────────

name: ML Model CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "lesson07-cicd-ml-pipeline/**"

env:
  MODEL_REGISTRY: artifacts/model-registry.jsonl
  MIN_ACCURACY: "0.85"

defaults:
  run:
    working-directory: lesson07-cicd-ml-pipeline

jobs:
  train:
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.metrics.outputs.accuracy }}
      model_path: ${{ steps.train.outputs.model_path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5

      - name: Sync project environment
        run: uv sync --python 3.13

      - name: Train model
        id: train
        run: |
          uv run python src/train.py \
            --data data/features/latest.csv \
            --output models/credit_risk_v${{ github.run_number }}.pkl
          echo "model_path=models/credit_risk_v${{ github.run_number }}.pkl" >> $GITHUB_OUTPUT

      - name: Evaluate metrics
        id: metrics
        run: |
          ACCURACY=$(uv run python src/evaluate.py --model ${{ steps.train.outputs.model_path }} --data data/features/latest.csv --output artifacts/train-metrics.json)
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: lesson07-cicd-ml-pipeline/${{ steps.train.outputs.model_path }}

  validate:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5

      - name: Sync project environment
        run: uv sync --python 3.13

      - name: Check accuracy threshold
        run: |
          uv run python - <<'PY'
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = float("${{ env.MIN_ACCURACY }}")
          if accuracy < threshold:
              raise SystemExit(f"::error::Accuracy {accuracy:.4f} is below the threshold {threshold:.2f}")
          PY

      - name: Bias and fairness tests
        run: |
          uv run python src/bias_check.py \
            --model ${{ needs.train.outputs.model_path }} \
            --data data/features/latest.csv \
            --output artifacts/fairness-report.json

      - name: Integration tests
        run: uv run pytest tests/integration/ -v

  deploy:
    needs: [train, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5

      - name: Sync project environment
        run: uv sync --python 3.13

      - uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: lesson07-cicd-ml-pipeline/models

      - name: Agentic release gate
        run: |
          uv run python src/foundry_release_gate.py \
            --model ${{ needs.train.outputs.model_path }} \
            --data data/features/latest.csv \
            --accuracy-threshold ${{ env.MIN_ACCURACY }} \
            --deployment-strategy canary \
            --traffic-weight 10 \
            --mode auto \
            --enforce \
            --output artifacts/release-gate.json

      - name: Provision infrastructure through Terraform
        run: |
          cd infra/
          terraform init && terraform apply -auto-approve \
            -var="model_version=v${{ github.run_number }}"

      - name: Canary deployment (10% of traffic)
        run: |
          uv run python src/deploy.py \
            --strategy canary --weight 10 \
            --model ${{ needs.train.outputs.model_path }} \
            --output artifacts/deployment-report.json

      - name: Register model in the registry
        run: |
          uv run python src/register_model.py \
            --path ${{ needs.train.outputs.model_path }} \
            --accuracy ${{ needs.train.outputs.accuracy }} \
            --run-id ${{ github.run_id }} \
            --registry $MODEL_REGISTRY
